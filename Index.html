<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;}

@keyframes glowPulse{
0%,100%{box-shadow:0 0 8px rgba(0,255,102,0.35),0 0 20px rgba(0,255,102,0.1) inset;}
50%{box-shadow:0 0 20px rgba(0,255,102,0.7),0 0 30px rgba(0,255,102,0.2) inset;}
}

@keyframes fadeIn{
from{opacity:0;transform:translate(-50%,-46%);}
to{opacity:1;transform:translate(-50%,-50%);}
}

@keyframes flicker{
0%,100%{opacity:1;}
92%{opacity:1;}
93%{opacity:0.6;}
94%{opacity:1;}
}

body{

background:#020403;
font-family:'Consolas','Courier New',monospace;
color:#00ff66;
overflow:hidden;

top:0;left:0;

}

h2,h3{
letter-spacing:2px;

width:360px;

color:#020403;

.small{font-size:11px;opacity:0.65}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.btn-sm{
width:auto;
padding:6px 12px;

font-size:11px;

}

.btn-row{
display:flex;

gap:8px;
margin-top:10px;

.btn-row button{
width:auto;
flex:1 1 90px;

}

gap:8px;

.tag.active{background:rgba(0,255,102,0.15);color:#00ff66;border:1px solid #00ff66;}
.tag.expired{background:rgba(255,59,59,0.12);color:#ff5c5c;border:1px solid #ff5c5c;}

<body>

<canvas id="matrix"></canvas>

<script>

/* ===== MATRIX BACKGROUND ===== */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

function resizeCanvas(){
c.width=innerWidth;
c.height=innerHeight;
cols=Math.floor(c.width/16);
drops=Array(cols).fill(1).map(()=>Math.random()*-100);
speeds=Array(cols).fill(0).map(()=>0.3+Math.random()*1.2);
}

let cols, drops, speeds;
const chars="アイウエオカキクケコサシスセソ01ABCDEF$#@*+-<>/\\";
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function draw(){
ctx.fillStyle="rgba(2,4,3,0.08)";
ctx.fillRect(0,0,c.width,c.height);

for(let i=0;i<drops.length;i++){
const x=i*16;
const y=drops[i]*16;
const ch=chars[Math.floor(Math.random()*chars.length)];

// leading character brighter
ctx.fillStyle="rgba(180,255,210,0.9)";
ctx.font="14px monospace";
ctx.fillText(ch,x,y);

ctx.fillStyle="rgba(0,255,102,0.35)";
ctx.fillText(chars[Math.floor(Math.random()*chars.length)],x,y-16);

drops[i]+=speeds[i];
if(y>c.height && Math.random()>0.975){
drops[i]=Math.random()*-40;
speeds[i]=0.3+Math.random()*1.2;
}
}
}
setInterval(draw,45);

/* ===== DATA (SINCRONIZADO ENTRE DISPOSITIVOS via Netlify Function + Blobs) ===== */
const adminKey="ADMIN-ROOT-9X7";
const KV_ENDPOINT="/.netlify/functions/kv";
let hasCloud=false; // é atualizado após a primeira tentativa de acesso à function

async function cloudGet(key){
let r=await fetch(`${KV_ENDPOINT}?key=${encodeURIComponent(key)}`);
if(!r.ok) throw new Error("cloud get failed: "+r.status);
let data=await r.json();
return data.value;
}

async function cloudSet(key,value){
let r=await fetch(`${KV_ENDPOINT}?key=${encodeURIComponent(key)}`,{
method:"POST",
headers:{"Content-Type":"application/json","x-admin-key":adminKey},
body:JSON.stringify({value})
});
if(!r.ok) throw new Error("cloud set failed: "+r.status);
}

let db=[];
let historyDb=[];

// tenta a Netlify Function primeiro (sincroniza entre aparelhos);
// se a function não responder (offline, function não deployada, etc.),
// cai pro localStorage (só este aparelho)
async function loadDb(){
try{
let v=await cloudGet("db");
db = v ? JSON.parse(v) : [];
hasCloud=true;
return;
}catch(e){
hasCloud=false;
db=JSON.parse(localStorage.getItem("db")||"[]");
}
}

async function loadHistory(){
try{
let v=await cloudGet("keyHistory");
historyDb = v ? JSON.parse(v) : [];
hasCloud=true;
return;
}catch(e){
hasCloud=false;
historyDb=JSON.parse(localStorage.getItem("keyHistory")||"[]");
}
}

async function saveDb(){
localStorage.setItem("db",JSON.stringify(db)); // backup local sempre
try{
await cloudSet("db",JSON.stringify(db));
hasCloud=true;
}catch(e){ hasCloud=false; }
}

async function saveHistory(){
localStorage.setItem("keyHistory",JSON.stringify(historyDb));
try{
await cloudSet("keyHistory",JSON.stringify(historyDb));
hasCloud=true;
}catch(e){ hasCloud=false; }
}

function syncBadgeHtml(){
return hasCloud
? `<span class="tag active" style="margin-left:6px">🌐 KEYS UNIVERSAIS (SINCRONIZADAS)</span>`
: `<span class="tag revoked" style="margin-left:6px">💾 SOMENTE ESTE APARELHO</span>`;
}

/* ===== LOGIN ===== */
async function checkLogin(){

let u=user.value.trim();
let k=key.value.trim();

if(k===adminKey){
await enterAdmin();
return;
}

error.innerText="VERIFICANDO...";
await loadDb(); // busca a lista mais recente (inclui keys criadas em outros aparelhos)

let acc=db.find(x=>
x.user===u &&
x.key===k &&
x.active &&
x.exp>Date.now()
);

if(!acc){
error.innerText="LOGIN INVÁLIDO";
return;
}

error.innerText="";
enterApp();
}

function enterApp(){
login.style.display="none";
app.style.display="block";
admin.style.display="none";
}

async function enterAdmin(){
login.style.display="none";
app.style.display="none";
admin.style.display="block";
await loadDb();
await loadHistory();
render();
renderHistory();
update();
}

/* ===== KEY GENERATION ===== */
function generateKeyString(){
const part=()=>Math.random().toString(36).substring(2,7).toUpperCase();
return `KEY-${part()}-${part()}`;
}

async function createAccount(days){

let customName=customUser.value.trim();
let user=customName ? customName.toUpperCase().replace(/\s+/g,"_") : "USER_"+Math.random().toString(36).substring(2,8).toUpperCase();
let key=generateKeyString();
let now=Date.now();

let entry={
user,
key,
active:true,
createdAt:now,
exp:now+days*86400000,
days
};

db.push(entry);
await saveDb();

historyDb.unshift({
user,
key,
days,
createdAt:now,
exp:now+days*86400000,
action:"CRIADA"
});
await saveHistory();

customUser.value="";

render();
renderHistory();
update();
}

/* ===== ADMIN LIST (ATIVAS) ===== */
function render(){

if(db.length===0){
list.innerHTML="<div class='empty-msg'>NENHUMA KEY GERADA AINDA</div>"+`<div class="small" style="margin-top:8px">${syncBadgeHtml()}</div>`;
return;
}

list.innerHTML=`<div class="small" style="margin-bottom:8px">${syncBadgeHtml()}</div>`+db.slice().reverse().map(x=>{
let expired=x.exp<=Date.now();
let statusTag = !x.active ? `<span class="tag revoked">REVOGADA</span>`
: expired ? `<span class="tag expired">EXPIRADA</span>`
: `<span class="tag active">ATIVA</span>`;

return `
<div class="result-card">
<div class="top-bar" style="margin-bottom:4px">
<b>${x.user}</b>
${statusTag}
</div>
KEY: <code>${x.key}</code>
<button class="copy-btn" onclick="copyKey('${x.key}')">COPIAR</button><br>
<span class="small">Criada: ${new Date(x.createdAt||Date.now()).toLocaleString()} • Expira: ${new Date(x.exp).toLocaleString()} • ${x.days||"?"} dia(s)</span><br>
${x.active ? `<button class="copy-btn" style="margin-top:6px" onclick="revokeKey('${x.key}')">REVOGAR</button>` : ""}
</div>
`;
}).join("");

}

async function revokeKey(k){
let entry=db.find(x=>x.key===k);
if(!entry) return;
entry.active=false;
await saveDb();

historyDb.unshift({
user:entry.user,
key:entry.key,
days:entry.days,
createdAt:Date.now(),
exp:entry.exp,
action:"REVOGADA"
});
await saveHistory();

render();
renderHistory();
update();
}

function copyKey(k){
navigator.clipboard.writeText(k).catch(()=>{});
}

/* ===== HISTÓRICO ===== */
function renderHistory(){

let q=(document.getElementById("searchHist")?.value||"").trim().toLowerCase();

let data=historyDb.filter(x=>
!q || x.user.toLowerCase().includes(q) || x.key.toLowerCase().includes(q)
);

if(data.length===0){
history.innerHTML="<div class='empty-msg'>NENHUM REGISTRO NO HISTÓRICO</div>";
return;
}

history.innerHTML=data.map(x=>`
<div class="result-card">
<div class="top-bar" style="margin-bottom:4px">
<b>${x.user}</b>
<span class="small">${x.action}</span>
</div>
KEY: <code>${x.key}</code>
<button class="copy-btn" onclick="copyKey('${x.key}')">COPIAR</button><br>
<span class="small">${new Date(x.createdAt).toLocaleString()} • ${x.days||"?"} dia(s) • expira ${new Date(x.exp).toLocaleDateString()}</span>
</div>
`).join("");

}

async function clearHistory(){
if(!confirm("Limpar todo o histórico de keys? Isso não afeta as keys ativas.")) return;
historyDb=[];
await saveHistory();
renderHistory();
}

function switchTab(tab){
const isGen = tab==="gen";
tabGen.style.display = isGen ? "block" : "none";
tabHist.style.display = isGen ? "none" : "block";
tabGenBtn.classList.toggle("active",isGen);
tabHistBtn.classList.toggle("active",!isGen);
if(!isGen) renderHistory();
}

function update(){
count.innerText=db.filter(x=>x.active && x.exp>Date.now()).length;
countExpired.innerText=db.filter(x=>!x.active || x.exp<=Date.now()).length;
countTotal.innerText=db.length;
}

/* ===== LOGOUT ===== */
function logoutUser(){
app.style.display="none";
login.style.display="block";
user.value="";
key.value="";
results.innerHTML="";
status.textContent="AGUARDANDO...";
progress.textContent="0%";
}

function logoutAdmin(){
admin.style.display="none";
login.style.display="block";
}

/* ===== SCANNER (detecção de proxy original + histórico de perfis novo) ===== */

function escapeHtml(str){
if(!str) return "";
return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;");
}

file.onchange = async e => {

const f = e.target.files[0];
if(!f) return;

status.textContent = "SCANNING...";
results.innerHTML="";

const proxies = [
{name:"ZEEX Free/VIP",values:["78f","d14","140","06"]},
{name:"Fatality Bypass",values:["1ea","b0","2c","9d"]},
{name:"Luxe Cheats",values:["b9","a4"]},
{name:"XTREMO",values:["com.xtremo.mobile"]},
{name:"DASH",values:["60a","70a","dash.proxy"]},
{name:"WORK",values:["d03090"]},
{name:"Community Guest",values:["439"]},
{name:"Casa de Aposta",values:["704114"]},
{name:"Desconhecida",values:[
"06a","84","7d","051","3c4","ae7","0af","proxyady",
"704","0d","40e","59ac","4cf","bd32","bd32d","90eb",
"d03","87","0e","47","f9","e0","51","bc","5b","e3",
"6b","c9","4d","d5","96f","a4c","dd4fa","dd4f0","5c"
]}
];

/* Indicadores públicos e amplamente documentados de jailbreak em iOS
(gerenciadores de pacotes, caminhos de sistema e ferramentas conhecidas) */
const jailbreakIndicators = [
"cydia","sileo","zebra","installer.app",
"mobilesubstrate","substitute","libsubstrate",
"/applications/cydia.app","/private/var/lib/apt",
"/private/var/stash","/private/var/lib/cydia",
"checkra1n","checkm8","unc0ver","taurine","chimera",
"electra","odyssey","palera1n","trollstore",
"com.saurik.cydia","apt/sources.list.d","undecimus"
];

/* Escapa caracteres especiais de regex num token literal */
function escapeRegex(s){
return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}

/* Palavras que só aparecem perto de perfis de configuração / MDM reais
num sysdiagnose. Exigir uma delas nas proximidades de um token evita
contar coincidências de hex aleatório espalhadas pelo arquivo. */
const profileContextWords = [
"mobileconfig","payloadidentifier","payloaduuid","payloadcontent",
"payloadtype","payloaddisplayname","payloadversion",
"configurationprofile","mcprofile","profileinstall","installedprofile",
"provisioningprofile"
];

function hasNearbyContext(text, idx, tokenLen){
let start=Math.max(0, idx-200);
let end=Math.min(text.length, idx+tokenLen+200);
let window=text.slice(start,end);
for(let kw of profileContextWords){
if(window.includes(kw)) return true;
}
return false;
}

/* Classificação por especificidade do token:
- "domain"  : contém "." ou "/" (ex: dash.proxy, com.xtremo.mobile) -> altamente específico,
              basta 1 ocorrência, sem precisar de contexto.
- length<=2 : descartado — hex de 1-2 chars é comum demais pra servir de evidência,
              mesmo isolado e com contexto perto, então nem entra na varredura.
- length 3-4: "médio" -> precisa de contexto por perto E o grupo só é sinalizado
              com pelo menos 2 pontos de evidência (peso 1 cada).
- length>=5 : "alto" -> precisa de contexto por perto, mas sozinho já basta (peso 2). */
function tokenTier(token){
if(token.includes(".") || token.includes("/")) return "domain";
if(token.length<=2) return "skip";
if(token.length<=4) return "medium";
return "high";
}

const boundaryReCache=new Map();
function boundaryRegex(token){
let re=boundaryReCache.get(token);
if(!re){
re=new RegExp("(?<![a-z0-9])"+escapeRegex(token)+"(?![a-z0-9])","gi");
boundaryReCache.set(token,re);
}
re.lastIndex=0;
return re;
}

const EVIDENCE_THRESHOLD=2; // pontuação mínima acumulada pra um grupo ser sinalizado

/* Acumuladores por grupo, válidos para o arquivo inteiro (não por chunk) */
let groupScore={}, groupHitTokens={};
for(let g of proxies){
groupScore[g.name]=0;
groupHitTokens[g.name]=new Set();
}

let found=[];
let jbFound=[];
let profileEvents=[];
let seenEvents=new Set();
let prevTail=""; // mantém o final do chunk anterior para não perder ocorrências na fronteira

let offset=0;
let total=f.size;
const chunk=1024*512;

while(offset < total){

let slice=f.slice(offset, offset+chunk);
let rawText=await slice.text();
let text=(prevTail+rawText).toLowerCase();

/* --- detecção de proxy, ponderada por especificidade do token --- */
for(let g of proxies){
for(let v of g.values){

let tier=tokenTier(v);
if(tier==="skip") continue;

if(tier==="domain"){
if(text.includes(v)){
groupScore[g.name]+=EVIDENCE_THRESHOLD; // sozinho já basta
groupHitTokens[g.name].add(v);
}
continue;
}

let re=boundaryRegex(v);
let m;
while((m=re.exec(text))!==null){
if(hasNearbyContext(text, m.index, v.length)){
groupScore[g.name]+=(tier==="high"?2:1);
groupHitTokens[g.name].add(v);
}
}
